name: Download FFmpeg All Platforms
run-name: "FFmpeg ${{ github.event.inputs.ffmpeg_version }} — ${{ github.event.inputs.platforms }}"

on:
  workflow_dispatch:
    inputs:
      ffmpeg_version:
        description: 'FFmpeg version (e.g., 8.1, 7.1, 6.1)'
        required: true
        default: '8.1'
        type: string
      platforms:
        description: 'Platforms to download (comma-separated: windows,macos,linux)'
        required: true
        default: 'windows,macos,linux'
        type: string

env:
  FFMPEG_VERSION: ${{ github.event.inputs.ffmpeg_version }}
  # BtbN builds (Windows + Linux only): https://github.com/BtbN/FFmpeg-Builds/releases
  BTBN_BASE: 'https://github.com/BtbN/FFmpeg-Builds/releases/download/latest'

jobs:
  # ============================================================================
  # Windows (x64) — from BtbN, fallback to Gyan.dev
  # ============================================================================
  download-windows:
    if: contains(github.event.inputs.platforms, 'windows')
    runs-on: ubuntu-latest
    name: Download (Windows x64)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download FFmpeg for Windows
        run: |
          BASE="${{ env.BTBN_BASE }}"
          VER="${{ env.FFMPEG_VERSION }}"

          # BtbN naming: ffmpeg-n8.1-latest-win64-gpl-8.1.zip
          URLS=(
            "${BASE}/ffmpeg-n${VER}-latest-win64-gpl-${VER}.zip"
            "${BASE}/ffmpeg-n${VER}-latest-win64-lgpl-${VER}.zip"
            "https://www.gyan.dev/ffmpeg/builds/packages/ffmpeg-${VER}-full_build.zip"
          )

          DOWNLOADED=false
          for url in "${URLS[@]}"; do
            echo "Trying: $url"
            if curl -fSL -o ffmpeg.zip "$url" 2>/dev/null; then
              echo "✓ Downloaded from: $url"
              DOWNLOADED=true
              break
            fi
            echo "✗ Not found, trying next..."
          done

          if [ "$DOWNLOADED" = false ]; then
            echo "::error::Could not download FFmpeg ${VER} for Windows"
            exit 1
          fi

      - name: Extract and prepare artifact
        run: |
          unzip -q ffmpeg.zip -d ffmpeg_raw

          FFMPEG_BIN=$(find ffmpeg_raw -name "ffmpeg.exe" -type f | head -1)
          FFPROBE_BIN=$(find ffmpeg_raw -name "ffprobe.exe" -type f | head -1)

          if [[ -z "$FFMPEG_BIN" || -z "$FFPROBE_BIN" ]]; then
            echo "::error::ffmpeg.exe or ffprobe.exe not found in archive"
            find ffmpeg_raw -type f | head -20
            exit 1
          fi

          mkdir -p artifact/windows/x64
          cp "$FFMPEG_BIN"  artifact/windows/x64/ffmpeg.exe
          cp "$FFPROBE_BIN" artifact/windows/x64/ffprobe.exe

          echo "=== Windows artifacts ==="
          ls -la artifact/windows/x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-x64
          path: artifact/
          retention-days: 30

  # ============================================================================
  # macOS — Intel + ARM via Homebrew (most reliable macOS package source)
  # BtbN does NOT provide macOS builds.
  # Homebrew is the most mature macOS package manager; FFmpeg is a core formula.
  # We install via brew, then copy the binaries out.
  # ============================================================================
  download-macos:
    if: contains(github.event.inputs.platforms, 'macos')
    runs-on: macos-latest
    name: Download (macOS)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg via Homebrew
        run: |
          # Homebrew on macos-latest (ARM) installs native arm64 binaries
          brew install ffmpeg

          FFMPEG_BIN=$(which ffmpeg)
          FFPROBE_BIN=$(which ffprobe)

          echo "ffmpeg:  $FFMPEG_BIN"
          echo "ffprobe: $FFPROBE_BIN"

          # Verify they work
          ffmpeg -version | head -1
          ffprobe -version | head -1

          # Show architecture
          file "$FFMPEG_BIN"
          file "$FFPROBE_BIN"

      - name: Prepare artifact
        run: |
          FFMPEG_BIN=$(which ffmpeg)
          FFPROBE_BIN=$(which ffprobe)

          # Resolve symlinks to get real binaries
          FFMPEG_REAL=$(realpath "$FFMPEG_BIN")
          FFPROBE_REAL=$(realpath "$FFPROBE_BIN")

          # macos-latest is ARM — produces native arm64 binaries
          # Copy to arm/ directly; intel/ gets the same binary (runs via Rosetta 2)
          for dir in intel arm; do
            mkdir -p artifact/macosx/$dir
            cp "$FFMPEG_REAL"  artifact/macosx/$dir/ffmpeg
            cp "$FFPROBE_REAL" artifact/macosx/$dir/ffprobe
            chmod +x artifact/macosx/$dir/ffmpeg artifact/macosx/$dir/ffprobe
          done

          echo "=== macOS artifacts ==="
          find artifact/macosx -type f -exec ls -lh {} \;
          echo ""
          echo "=== Architecture check ==="
          file artifact/macosx/arm/ffmpeg

      - name: Upload artifact (intel)
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-intel
          path: artifact/macosx/intel/
          retention-days: 30

      - name: Upload artifact (arm)
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-arm
          path: artifact/macosx/arm/
          retention-days: 30

  # ============================================================================
  # Linux (x64) — from BtbN, fallback to johnvansickle.com
  # ============================================================================
  download-linux:
    if: contains(github.event.inputs.platforms, 'linux')
    runs-on: ubuntu-latest
    name: Download (Linux x64)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download FFmpeg for Linux
        run: |
          BASE="${{ env.BTBN_BASE }}"
          VER="${{ env.FFMPEG_VERSION }}"

          # BtbN naming: ffmpeg-n8.1-latest-linux64-gpl-8.1.tar.xz
          URLS=(
            "${BASE}/ffmpeg-n${VER}-latest-linux64-gpl-${VER}.tar.xz"
            "${BASE}/ffmpeg-n${VER}-latest-linux64-lgpl-${VER}.tar.xz"
            "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          )

          DOWNLOADED=false
          for url in "${URLS[@]}"; do
            echo "Trying: $url"
            if curl -fSL -o ffmpeg.tar.xz "$url" 2>/dev/null; then
              echo "✓ Downloaded from: $url"
              DOWNLOADED=true
              break
            fi
            echo "✗ Not found, trying next..."
          done

          if [ "$DOWNLOADED" = false ]; then
            echo "::error::Could not download FFmpeg ${VER} for Linux x64"
            exit 1
          fi

      - name: Extract and prepare artifact
        run: |
          mkdir -p ffmpeg_raw
          tar -xf ffmpeg.tar.xz -C ffmpeg_raw

          FFMPEG_BIN=$(find ffmpeg_raw -name "ffmpeg" -type f ! -name "*.txt" | head -1)
          FFPROBE_BIN=$(find ffmpeg_raw -name "ffprobe" -type f ! -name "*.txt" | head -1)

          if [[ -z "$FFMPEG_BIN" || -z "$FFPROBE_BIN" ]]; then
            echo "::error::ffmpeg or ffprobe not found in archive"
            find ffmpeg_raw -type f | head -20
            exit 1
          fi

          mkdir -p artifact/linux/x64
          cp "$FFMPEG_BIN"  artifact/linux/x64/ffmpeg
          cp "$FFPROBE_BIN" artifact/linux/x64/ffprobe
          chmod +x artifact/linux/x64/ffmpeg artifact/linux/x64/ffprobe

          echo "=== Linux artifacts ==="
          ls -la artifact/linux/x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-x64
          path: artifact/
          retention-days: 30

  # ============================================================================
  # Merge All Artifacts
  # ============================================================================
  merge-artifacts:
    needs: [download-windows, download-macos, download-linux]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    name: Merge Artifacts

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ffmpeg-*
          path: downloads/

      - name: Merge into final structure
        run: |
          mkdir -p merged

          # Windows — artifact contains windows/x64/{ffmpeg.exe,ffprobe.exe}
          if [ -d "downloads/ffmpeg-windows-x64" ]; then
            cp -r downloads/ffmpeg-windows-x64/windows merged/
            echo "✓ Windows x64"
          fi

          # macOS — artifacts are flat (ffmpeg, ffprobe) without subdirs
          for dir in intel arm; do
            if [ -d "downloads/ffmpeg-macos-$dir" ]; then
              mkdir -p merged/macosx/$dir
              cp -r downloads/ffmpeg-macos-$dir/* merged/macosx/$dir/
              echo "✓ macOS $dir"
            fi
          done

          # Linux — artifact contains linux/x64/{ffmpeg,ffprobe}
          if [ -d "downloads/ffmpeg-linux-x64" ]; then
            cp -r downloads/ffmpeg-linux-x64/linux merged/
            echo "✓ Linux x64"
          fi

          echo ""
          echo "=== Final structure ==="
          find merged -type f | sort

          echo ""
          echo "=== File sizes ==="
          find merged -type f -exec ls -lh {} \;

      - name: Upload merged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-all-platforms-${{ github.event.inputs.ffmpeg_version }}
          path: merged/
          retention-days: 90
