name: Download FFmpeg (exe) All Platforms
run-name: "FFmpeg exe ${{ github.event.inputs.ffmpeg_version }} — ${{ github.event.inputs.platforms }}"

on:
  workflow_dispatch:
    inputs:
      ffmpeg_version:
        description: 'FFmpeg version (e.g., 8.1, 7.1, 6.1). Honored on Win/Linux only — macOS always uses the latest static build from evermeet.cx / osxexperts.net.'
        required: true
        default: '8.1'
        type: string
      platforms:
        description: 'Platforms to download (comma-separated: windows,windows-arm64,macos,linux)'
        required: true
        default: 'windows,windows-arm64,macos,linux'
        type: string

env:
  FFMPEG_VERSION: ${{ github.event.inputs.ffmpeg_version }}
  # BtbN builds (Windows x64/arm64 + Linux x64): https://github.com/BtbN/FFmpeg-Builds/releases
  BTBN_BASE: 'https://github.com/BtbN/FFmpeg-Builds/releases/download/latest'

jobs:
  # ============================================================================
  # Windows (x64) — from BtbN, fallback to Gyan.dev
  # ============================================================================
  download-windows:
    if: contains(github.event.inputs.platforms, 'windows')
    runs-on: ubuntu-latest
    name: Download (Windows x64)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download FFmpeg for Windows
        run: |
          BASE="${{ env.BTBN_BASE }}"
          VER="${{ env.FFMPEG_VERSION }}"

          # BtbN naming: ffmpeg-n8.1-latest-win64-gpl-8.1.zip
          URLS=(
            "${BASE}/ffmpeg-n${VER}-latest-win64-gpl-${VER}.zip"
            "${BASE}/ffmpeg-n${VER}-latest-win64-lgpl-${VER}.zip"
            "https://www.gyan.dev/ffmpeg/builds/packages/ffmpeg-${VER}-full_build.zip"
          )

          DOWNLOADED=false
          for url in "${URLS[@]}"; do
            echo "Trying: $url"
            if curl -fSL -o ffmpeg.zip "$url" 2>/dev/null; then
              echo "✓ Downloaded from: $url"
              DOWNLOADED=true
              break
            fi
            echo "✗ Not found, trying next..."
          done

          if [ "$DOWNLOADED" = false ]; then
            echo "::error::Could not download FFmpeg ${VER} for Windows"
            exit 1
          fi

      - name: Extract and prepare artifact
        run: |
          unzip -q ffmpeg.zip -d ffmpeg_raw

          FFMPEG_BIN=$(find ffmpeg_raw -name "ffmpeg.exe" -type f | head -1)
          FFPROBE_BIN=$(find ffmpeg_raw -name "ffprobe.exe" -type f | head -1)

          if [[ -z "$FFMPEG_BIN" || -z "$FFPROBE_BIN" ]]; then
            echo "::error::ffmpeg.exe or ffprobe.exe not found in archive"
            find ffmpeg_raw -type f | head -20
            exit 1
          fi

          mkdir -p artifact/windows/x64
          cp "$FFMPEG_BIN"  artifact/windows/x64/ffmpeg.exe
          cp "$FFPROBE_BIN" artifact/windows/x64/ffprobe.exe

          echo "=== Windows artifacts ==="
          ls -la artifact/windows/x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-x64
          path: artifact/
          retention-days: 30

  # ============================================================================
  # Windows (ARM64) — from BtbN
  # BtbN ships winarm64 GPL builds; no Gyan fallback (Gyan is x64 only).
  # Use the exact same VERSION pin as x64 for consistency.
  # ============================================================================
  download-windows-arm64:
    if: contains(github.event.inputs.platforms, 'windows-arm64')
    runs-on: ubuntu-latest
    name: Download (Windows ARM64)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download FFmpeg for Windows ARM64
        run: |
          BASE="${{ env.BTBN_BASE }}"
          VER="${{ env.FFMPEG_VERSION }}"

          # BtbN naming: ffmpeg-n8.1-latest-winarm64-gpl-8.1.zip
          URLS=(
            "${BASE}/ffmpeg-n${VER}-latest-winarm64-gpl-${VER}.zip"
            "${BASE}/ffmpeg-n${VER}-latest-winarm64-lgpl-${VER}.zip"
          )

          DOWNLOADED=false
          for url in "${URLS[@]}"; do
            echo "Trying: $url"
            if curl -fSL -o ffmpeg.zip "$url" 2>/dev/null; then
              echo "✓ Downloaded from: $url"
              DOWNLOADED=true
              break
            fi
            echo "✗ Not found, trying next..."
          done

          if [ "$DOWNLOADED" = false ]; then
            echo "::error::Could not download FFmpeg ${VER} for Windows ARM64. Note: BtbN may not have arm64 builds for very old ffmpeg versions; try 6.0 or newer."
            exit 1
          fi

      - name: Extract and prepare artifact
        run: |
          unzip -q ffmpeg.zip -d ffmpeg_raw

          FFMPEG_BIN=$(find ffmpeg_raw -name "ffmpeg.exe" -type f | head -1)
          FFPROBE_BIN=$(find ffmpeg_raw -name "ffprobe.exe" -type f | head -1)

          if [[ -z "$FFMPEG_BIN" || -z "$FFPROBE_BIN" ]]; then
            echo "::error::ffmpeg.exe or ffprobe.exe not found in archive"
            find ffmpeg_raw -type f | head -20
            exit 1
          fi

          mkdir -p artifact/windows/arm64
          cp "$FFMPEG_BIN"  artifact/windows/arm64/ffmpeg.exe
          cp "$FFPROBE_BIN" artifact/windows/arm64/ffprobe.exe

          echo "=== Windows ARM64 artifacts ==="
          ls -la artifact/windows/arm64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-arm64
          path: artifact/
          retention-days: 30

  # ============================================================================
  # macOS — prebuilt static binaries (latest only)
  #
  # Sources:
  #   - x86_64 : evermeet.cx     (single-file static, no external dylib deps)
  #   - arm64  : osxexperts.net  (single-file static, no external dylib deps)
  #
  # Both mirrors only host "latest" — they do NOT keep historical versions.
  # The ffmpeg_version input is therefore ignored here. If you need a pinned
  # version on macOS you must compile from source (not done in this workflow).
  #
  # We never use Homebrew's ffmpeg formula: brew binaries are dynamically
  # linked to /opt/homebrew/Cellar/ffmpeg/<ver>/lib/*.dylib (absolute paths
  # baked into LC_LOAD_DYLIB), so copying the binary out crashes (SIGABRT)
  # on any machine without that exact brew Cellar version installed.
  # ============================================================================
  download-macos:
    if: contains(github.event.inputs.platforms, 'macos')
    runs-on: macos-latest
    name: Download (macOS)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install 7zip (needed to unpack evermeet archives)
        run: brew install p7zip

      - name: Download static FFmpeg/FFprobe (arm64 + x86_64)
        run: |
          set -euo pipefail
          mkdir -p artifact/macosx/arm artifact/macosx/intel

          echo "::warning::macOS ignores ffmpeg_version (${FFMPEG_VERSION}); evermeet/osxexperts only host the latest release."

          # ---- arm64 (Apple Silicon) — osxexperts.net ----
          # File name follows ffmpeg<MAJOR><MINOR>arm.zip; we try a couple of
          # recent ones since osxexperts has no stable "latest" alias.
          for tag in 711 71 7 8; do
            if curl -fSL -o ffmpeg-arm.zip   "https://www.osxexperts.net/ffmpeg${tag}arm.zip" \
            && curl -fSL -o ffprobe-arm.zip  "https://www.osxexperts.net/ffprobe${tag}arm.zip"; then
              echo "✓ osxexperts arm64: tag=${tag}"
              break
            fi
          done

          unzip -o ffmpeg-arm.zip   -d artifact/macosx/arm
          unzip -o ffprobe-arm.zip  -d artifact/macosx/arm

          # ---- x86_64 (Intel) — evermeet.cx ----
          curl -fSL -o ffmpeg-intel.7z  "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/7z"
          curl -fSL -o ffprobe-intel.7z "https://evermeet.cx/ffmpeg/getrelease/ffprobe/7z"

          7z x -y ffmpeg-intel.7z  -o./artifact/macosx/intel
          7z x -y ffprobe-intel.7z -o./artifact/macosx/intel

          chmod +x artifact/macosx/arm/ffmpeg   artifact/macosx/arm/ffprobe
          chmod +x artifact/macosx/intel/ffmpeg artifact/macosx/intel/ffprobe

      - name: Verify binaries are static (no homebrew dylib deps)
        run: |
          set -euo pipefail
          for arch in arm intel; do
            for bin in ffmpeg ffprobe; do
              path="artifact/macosx/$arch/$bin"
              echo "--- $path ---"
              ls -lh "$path"
              file "$path"

              DEPS=$(otool -L "$path" || true)
              echo "$DEPS" | head -20

              # FAIL if any non-system dylib is referenced.
              BAD=$(echo "$DEPS" | tail -n +2 | awk '{print $1}' \
                    | grep -Ev '^(/usr/lib/|/System/Library/)' || true)
              if [ -n "$BAD" ]; then
                echo "::error::$path has non-system dylib dependencies:"
                echo "$BAD"
                exit 1
              fi

              # Sanity: arm64 binary should run natively on the runner
              if [ "$arch" = "arm" ]; then
                "./$path" -version | head -1
              fi
            done
          done

      - name: Upload artifact (intel)
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-intel
          path: artifact/macosx/intel/
          retention-days: 30

      - name: Upload artifact (arm)
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-arm
          path: artifact/macosx/arm/
          retention-days: 30

  # ============================================================================
  # Linux (x64) — from BtbN, fallback to johnvansickle.com
  # ============================================================================
  download-linux:
    if: contains(github.event.inputs.platforms, 'linux')
    runs-on: ubuntu-latest
    name: Download (Linux x64)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download FFmpeg for Linux
        run: |
          BASE="${{ env.BTBN_BASE }}"
          VER="${{ env.FFMPEG_VERSION }}"

          # BtbN naming: ffmpeg-n8.1-latest-linux64-gpl-8.1.tar.xz
          URLS=(
            "${BASE}/ffmpeg-n${VER}-latest-linux64-gpl-${VER}.tar.xz"
            "${BASE}/ffmpeg-n${VER}-latest-linux64-lgpl-${VER}.tar.xz"
            "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          )

          DOWNLOADED=false
          for url in "${URLS[@]}"; do
            echo "Trying: $url"
            if curl -fSL -o ffmpeg.tar.xz "$url" 2>/dev/null; then
              echo "✓ Downloaded from: $url"
              DOWNLOADED=true
              break
            fi
            echo "✗ Not found, trying next..."
          done

          if [ "$DOWNLOADED" = false ]; then
            echo "::error::Could not download FFmpeg ${VER} for Linux x64"
            exit 1
          fi

      - name: Extract and prepare artifact
        run: |
          mkdir -p ffmpeg_raw
          tar -xf ffmpeg.tar.xz -C ffmpeg_raw

          FFMPEG_BIN=$(find ffmpeg_raw -name "ffmpeg" -type f ! -name "*.txt" | head -1)
          FFPROBE_BIN=$(find ffmpeg_raw -name "ffprobe" -type f ! -name "*.txt" | head -1)

          if [[ -z "$FFMPEG_BIN" || -z "$FFPROBE_BIN" ]]; then
            echo "::error::ffmpeg or ffprobe not found in archive"
            find ffmpeg_raw -type f | head -20
            exit 1
          fi

          mkdir -p artifact/linux/x64
          cp "$FFMPEG_BIN"  artifact/linux/x64/ffmpeg
          cp "$FFPROBE_BIN" artifact/linux/x64/ffprobe
          chmod +x artifact/linux/x64/ffmpeg artifact/linux/x64/ffprobe

          echo "=== Linux artifacts ==="
          ls -la artifact/linux/x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-x64
          path: artifact/
          retention-days: 30

  # ============================================================================
  # Merge All Artifacts
  # ============================================================================
  merge-artifacts:
    needs: [download-windows, download-windows-arm64, download-macos, download-linux]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    name: Merge Artifacts

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ffmpeg-*
          path: downloads/

      - name: Merge into final structure
        run: |
          mkdir -p merged

          # Windows x64 — artifact contains windows/x64/{ffmpeg.exe,ffprobe.exe}
          if [ -d "downloads/ffmpeg-windows-x64" ]; then
            mkdir -p merged/windows
            cp -r downloads/ffmpeg-windows-x64/windows/* merged/windows/
            echo "✓ Windows x64"
          fi

          # Windows ARM64 — artifact contains windows/arm64/{ffmpeg.exe,ffprobe.exe}
          if [ -d "downloads/ffmpeg-windows-arm64" ]; then
            mkdir -p merged/windows
            cp -r downloads/ffmpeg-windows-arm64/windows/* merged/windows/
            echo "✓ Windows ARM64"
          fi

          # macOS — artifacts are flat (ffmpeg, ffprobe) without subdirs
          for dir in intel arm; do
            if [ -d "downloads/ffmpeg-macos-$dir" ]; then
              mkdir -p merged/macosx/$dir
              cp -r downloads/ffmpeg-macos-$dir/* merged/macosx/$dir/
              echo "✓ macOS $dir"
            fi
          done

          # Linux — artifact contains linux/x64/{ffmpeg,ffprobe}
          if [ -d "downloads/ffmpeg-linux-x64" ]; then
            cp -r downloads/ffmpeg-linux-x64/linux merged/
            echo "✓ Linux x64"
          fi

          echo ""
          echo "=== Final structure ==="
          find merged -type f | sort

          echo ""
          echo "=== File sizes ==="
          find merged -type f -exec ls -lh {} \;

      - name: Upload merged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-all-platforms-${{ github.event.inputs.ffmpeg_version }}
          path: merged/
          retention-days: 90
