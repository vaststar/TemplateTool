name: Release All Platforms

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2026.04.0). Leave empty to build without releasing.'
        required: false
        type: string
      mandatory:
        description: 'Force all users to upgrade (use only for critical security fixes)'
        required: false
        type: boolean
        default: false

env:
  QT_VERSION: '6.8.3'

jobs:
  # ============================================================================
  # Build & Package — one job per platform
  # ============================================================================
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: windows-msvc-release
            platform_label: Windows
            platform_key: windows-x64
            build_cmd: build.bat
            qt_modules: 'qtmultimedia'
          - os: ubuntu-22.04
            preset: linux-release
            platform_label: Linux
            platform_key: linux-x64
            build_cmd: ./build.sh
            qt_modules: 'qtmultimedia'
          - os: macos-latest
            preset: macos-release
            platform_label: macOS
            platform_key: macos-arm64
            build_cmd: ./build.sh
            qt_modules: 'qtmultimedia'

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform_label }})

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      # fetch-depth: 0 is required — VERSION_BUILD is derived from
      # `git rev-list --count HEAD` (commit depth).  A shallow clone
      # would produce build number "1" instead of the real count.
      # ref: when manual dispatch specifies a tag, checkout that tag's commit
      #      so the build matches the tagged version exactly.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0
          submodules: recursive

      # ── Install Qt ────────────────────────────────────────────────────────
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: ${{ matrix.qt_modules }}
          cache: true

      # ── Platform-specific toolchain setup ─────────────────────────────────
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libtiff-dev \
            libopenexr-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev

      # ── Build & Package ───────────────────────────────────────────────────
      - name: Build & Package
        shell: bash
        run: |
          # On Linux the prebuilt libopencv_world.so has transitive NEEDED deps
          # (libtiff, OpenEXR, FFmpeg) in /usr/lib/x86_64-linux-gnu/ — a path
          # the GNU linker does NOT search by default for indirect deps.
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            export LDFLAGS="-Wl,-rpath-link,/usr/lib/x86_64-linux-gnu"
          fi
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cmd //c "build.bat ${{ matrix.preset }} package"
          else
            chmod +x build.sh
            ./build.sh ${{ matrix.preset }} package
          fi

      # ── Run Tests ─────────────────────────────────────────────────────────
      - name: Run Tests
        shell: bash
        run: |
          cd build/${{ matrix.preset }}
          ctest --preset ${{ matrix.preset }} || true

      # ── Locate packages & compute SHA-256 ─────────────────────────────────
      - name: Locate packages and compute checksums
        id: pkg
        shell: bash
        run: |
          BUILD_DIR="build/${{ matrix.preset }}"

          # Collect all package files (zip, tar.gz, deb, dmg)
          PACKAGES=$(find "$BUILD_DIR" -maxdepth 1 \
            \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.deb" -o -name "*.dmg" \) \
            ! -name "*.sha256" | sort)

          if [[ -z "$PACKAGES" ]]; then
            echo "::error::No package files found in $BUILD_DIR"
            exit 1
          fi

          echo "=== Found packages ==="
          echo "$PACKAGES"

          # Compute SHA-256 for each package
          UPLOAD_FILES=""
          while IFS= read -r PKG; do
            if [[ "${{ runner.os }}" == "macOS" ]]; then
              shasum -a 256 "$PKG" | awk '{print $1}' > "${PKG}.sha256"
            else
              sha256sum "$PKG" | awk '{print $1}' > "${PKG}.sha256"
            fi
            echo "  $(basename "$PKG"): $(cat "${PKG}.sha256")"
            UPLOAD_FILES="${UPLOAD_FILES}${PKG}"$'\n'"${PKG}.sha256"$'\n'
          done <<< "$PACKAGES"

          # Write file list for upload
          echo "$UPLOAD_FILES" > /tmp/upload_files.txt
          echo "build_dir=$BUILD_DIR" >> "$GITHUB_OUTPUT"

      # ── Copy CMake-generated package-info.json to package dir ─────────────
      # package-info.json is generated by CMake (bundle_pack) with the exact
      # version and platform key — no regex parsing needed.
      - name: Copy package-info.json
        shell: bash
        run: |
          BUILD_DIR="build/${{ matrix.preset }}"
          # CMake generates it under product/bundle_pack/
          SRC=$(find "$BUILD_DIR" -path "*/bundle_pack/package-info.json" | head -1)
          if [[ -n "$SRC" ]]; then
            cp "$SRC" "$BUILD_DIR/package-info.json"
            echo "=== package-info.json ==="
            cat "$BUILD_DIR/package-info.json"
          else
            echo "::error::package-info.json not found in build tree"
            exit 1
          fi

      # ── Upload as build artifact ──────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.platform_label }}
          path: |
            build/${{ matrix.preset }}/*.zip
            build/${{ matrix.preset }}/*.zip.sha256
            build/${{ matrix.preset }}/*.tar.gz
            build/${{ matrix.preset }}/*.tar.gz.sha256
            build/${{ matrix.preset }}/*.deb
            build/${{ matrix.preset }}/*.deb.sha256
            build/${{ matrix.preset }}/*.dmg
            build/${{ matrix.preset }}/*.dmg.sha256
            build/${{ matrix.preset }}/package-info.json
          if-no-files-found: error
          retention-days: 30

  # ============================================================================
  # Create GitHub Release (on tag push OR manual dispatch with tag input)
  # ============================================================================
  release:
    needs: build
    if: >-
      startsWith(github.ref, 'refs/tags/v')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write

    env:
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.tag }}

    steps:
      - name: Checkout (for release notes context)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag (manual dispatch only, skip if tag exists)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists, skipping creation."
          else
            echo "Creating tag $RELEASE_TAG on current HEAD..."
            git tag "$RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== Release artifacts ==="
          find artifacts -type f | sort
          echo ""
          echo "=== SHA-256 checksums ==="
          for f in artifacts/*.sha256; do
            echo "$(cat "$f")  $(basename "${f%.sha256}")"
          done

      # ── Generate upgrade-manifest.json ────────────────────────────────────
      # Data sources:
      #   version    → CMake-generated package-info.json (product_info.json + git depth)
      #   mandatory  → workflow_dispatch input, fallback to release-config.json
      #   minVersion → product/bundle_pack/release-config.json (versioned with code)
      #   packages   → per-platform package-info.json + .sha256 files from build jobs
      - name: Generate upgrade manifest
        run: |
          REPO="${{ github.repository }}"
          TAG="$RELEASE_TAG"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          MANDATORY_FLAG=""
          if [[ "${{ github.event.inputs.mandatory }}" == "true" ]]; then
            MANDATORY_FLAG="--mandatory"
          fi

          python3 product/bundle_pack/scripts/generate_upgrade_manifest.py \
            --artifacts-dir artifacts \
            --base-url "$BASE_URL" \
            --release-config product/bundle_pack/release-config.json \
            --output artifacts/upgrade-manifest.json \
            $MANDATORY_FLAG

          # Clean up package-info.json files (don't upload to release)
          find artifacts -name "package-info.json" -delete

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
