name: Build libarchive All Platforms

on:
  workflow_dispatch:
    inputs:
      libarchive_version:
        description: 'libarchive version (e.g., 3.8.7)'
        required: true
        default: '3.8.7'
        type: string
      zlib_version:
        description: 'zlib-ng version used for gzip support (e.g., 2.3.3)'
        required: true
        default: '2.3.3'
        type: string
      platforms:
        description: 'Platforms to build (comma-separated: windows,macos,ios,android,linux)'
        required: true
        default: 'windows,macos,ios,android,linux'
        type: string

env:
  LIBARCHIVE_VERSION: ${{ github.event.inputs.libarchive_version }}
  ZLIB_VERSION: ${{ github.event.inputs.zlib_version }}

jobs:
  build-windows:
    if: contains(github.event.inputs.platforms, 'windows')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
            msvc_arch: amd64
          - arch: x86
            cmake_arch: Win32
            msvc_arch: amd64_x86
          - arch: arm64
            cmake_arch: ARM64
            msvc_arch: amd64_arm64

    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Download zlib-ng source
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/zlib-ng/zlib-ng/archive/refs/tags/${{ env.ZLIB_VERSION }}.zip" -OutFile zlib.zip
          Expand-Archive zlib.zip -DestinationPath .
          Rename-Item "zlib-ng-${{ env.ZLIB_VERSION }}" zlib_src

      - name: Build zlib-ng (static)
        shell: cmd
        run: |
          mkdir zlib_build
          cd zlib_build
          cmake ../zlib_src ^
            -G "Visual Studio 17 2022" ^
            -A ${{ matrix.cmake_arch }} ^
            -DCMAKE_INSTALL_PREFIX=../zlib_install ^
            -DZLIB_COMPAT=ON ^
            -DZLIB_ENABLE_TESTS=OFF ^
            -DBUILD_SHARED_LIBS=OFF
          cmake --build . --config Release --parallel
          cmake --install . --config Release

      - name: Download libarchive source
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/libarchive/libarchive/releases/download/v${{ env.LIBARCHIVE_VERSION }}/libarchive-${{ env.LIBARCHIVE_VERSION }}.tar.xz" -OutFile libarchive.tar.xz
          tar -xf libarchive.tar.xz
          Rename-Item "libarchive-${{ env.LIBARCHIVE_VERSION }}" libarchive_src

      - name: Build libarchive (shared)
        shell: cmd
        run: |
          mkdir la_build
          cd la_build
          cmake ../libarchive_src ^
            -G "Visual Studio 17 2022" ^
            -A ${{ matrix.cmake_arch }} ^
            -DCMAKE_INSTALL_PREFIX=../la_install ^
            -DBUILD_SHARED_LIBS=ON ^
            -DENABLE_TEST=OFF ^
            -DENABLE_CPIO=OFF ^
            -DENABLE_CAT=OFF ^
            -DENABLE_TAR=ON ^
            -DENABLE_XATTR=OFF ^
            -DENABLE_ACL=OFF ^
            -DENABLE_BZip2=OFF ^
            -DENABLE_LIBXML2=OFF ^
            -DENABLE_EXPAT=OFF ^
            -DENABLE_LZ4=OFF ^
            -DENABLE_LZMA=OFF ^
            -DENABLE_ZSTD=OFF ^
            -DENABLE_ICONV=OFF ^
            -DENABLE_OPENSSL=OFF ^
            -DENABLE_NETTLE=OFF ^
            -DENABLE_ZLIB=ON ^
            -DZLIB_ROOT=../zlib_install ^
            -DCMAKE_PREFIX_PATH=../zlib_install
          cmake --build . --config Release --parallel
          cmake --install . --config Release

      - name: Prepare artifact
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path "artifact/windows/$arch/include"
          New-Item -ItemType Directory -Force -Path "artifact/windows/$arch/lib"
          New-Item -ItemType Directory -Force -Path "artifact/windows/$arch/bin"

          Copy-Item -Force "la_install/include/archive*.h" "artifact/windows/$arch/include/"
          Get-ChildItem -Path la_install -Recurse -Include "*.lib" | ForEach-Object {
            Copy-Item $_.FullName "artifact/windows/$arch/lib/" -ErrorAction SilentlyContinue
          }
          Get-ChildItem -Path la_install -Recurse -Include "*.dll" | ForEach-Object {
            Copy-Item $_.FullName "artifact/windows/$arch/bin/" -ErrorAction SilentlyContinue
          }

      - name: Verify artifact
        uses: ./.github/actions/verify-artifact
        with:
          artifact-path: artifact/windows/${{ matrix.arch }}
          platform: windows
          library-name: libarchive
          target-arch: ${{ matrix.arch }}
          expect-shared-libs: '1'
          expect-static-libs: '1'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libarchive-windows-${{ matrix.arch }}
          path: artifact/
          retention-days: 30

  build-macos:
    if: contains(github.event.inputs.platforms, 'macos')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: x86_64
            platform_name: intel
          - os: macos-15
            arch: arm64
            platform_name: arm

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja xz

      - name: Download zlib-ng source
        run: |
          curl -L -o zlib.tar.gz https://github.com/zlib-ng/zlib-ng/archive/refs/tags/${{ env.ZLIB_VERSION }}.tar.gz
          tar -xzf zlib.tar.gz
          mv zlib-ng-${{ env.ZLIB_VERSION }} zlib_src

      - name: Build zlib-ng (static)
        run: |
          cmake -B zlib_build -S zlib_src \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_INSTALL_PREFIX=$PWD/zlib_install \
            -DZLIB_COMPAT=ON \
            -DZLIB_ENABLE_TESTS=OFF \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build zlib_build --parallel $(sysctl -n hw.ncpu)
          cmake --install zlib_build

      - name: Download libarchive source
        run: |
          curl -L -o libarchive.tar.xz https://github.com/libarchive/libarchive/releases/download/v${{ env.LIBARCHIVE_VERSION }}/libarchive-${{ env.LIBARCHIVE_VERSION }}.tar.xz
          tar -xf libarchive.tar.xz
          mv libarchive-${{ env.LIBARCHIVE_VERSION }} libarchive_src

      - name: Build libarchive (shared)
        run: |
          cmake -B la_build -S libarchive_src \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_INSTALL_PREFIX=$PWD/la_install \
            -DBUILD_SHARED_LIBS=ON \
            -DENABLE_TEST=OFF \
            -DENABLE_CPIO=OFF \
            -DENABLE_CAT=OFF \
            -DENABLE_TAR=ON \
            -DENABLE_XATTR=OFF \
            -DENABLE_ACL=OFF \
            -DENABLE_BZip2=OFF \
            -DENABLE_LIBXML2=OFF \
            -DENABLE_EXPAT=OFF \
            -DENABLE_LZ4=OFF \
            -DENABLE_LZMA=OFF \
            -DENABLE_ZSTD=OFF \
            -DENABLE_ICONV=OFF \
            -DENABLE_OPENSSL=OFF \
            -DENABLE_NETTLE=OFF \
            -DENABLE_ZLIB=ON \
            -DZLIB_ROOT=$PWD/zlib_install \
            -DCMAKE_PREFIX_PATH=$PWD/zlib_install
          cmake --build la_build --parallel $(sysctl -n hw.ncpu)
          cmake --install la_build

      - name: Prepare artifact
        run: |
          PLATFORM="${{ matrix.platform_name }}"
          mkdir -p artifact/macosx/$PLATFORM/include
          mkdir -p artifact/macosx/$PLATFORM/lib

          cp la_install/include/archive*.h artifact/macosx/$PLATFORM/include/
          cp la_install/lib/*.dylib artifact/macosx/$PLATFORM/lib/ 2>/dev/null || true

      - name: Verify artifact
        uses: ./.github/actions/verify-artifact
        with:
          artifact-path: artifact/macosx/${{ matrix.platform_name }}
          platform: macos
          library-name: libarchive
          expect-shared-libs: '1'
          expect-static-libs: '0'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libarchive-macos-${{ matrix.platform_name }}
          path: artifact/
          retention-days: 30

  build-ios:
    if: contains(github.event.inputs.platforms, 'ios')
    runs-on: macos-14

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iphoneos
            arch: arm64
            sdk: iphoneos
          - platform: iphonesimulator
            arch: arm64
            sdk: iphonesimulator
          - platform: iphonesimulator
            arch: x86_64
            sdk: iphonesimulator

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja xz

      - name: Download zlib-ng source
        run: |
          curl -L -o zlib.tar.gz https://github.com/zlib-ng/zlib-ng/archive/refs/tags/${{ env.ZLIB_VERSION }}.tar.gz
          tar -xzf zlib.tar.gz
          mv zlib-ng-${{ env.ZLIB_VERSION }} zlib_src

      - name: Build zlib-ng (static)
        run: |
          cmake -B zlib_build -S zlib_src \
            -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=${{ matrix.sdk }} \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_INSTALL_PREFIX=$PWD/zlib_install \
            -DZLIB_COMPAT=ON \
            -DZLIB_ENABLE_TESTS=OFF \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build zlib_build --parallel $(sysctl -n hw.ncpu)
          cmake --install zlib_build

      - name: Download libarchive source
        run: |
          curl -L -o libarchive.tar.xz https://github.com/libarchive/libarchive/releases/download/v${{ env.LIBARCHIVE_VERSION }}/libarchive-${{ env.LIBARCHIVE_VERSION }}.tar.xz
          tar -xf libarchive.tar.xz
          mv libarchive-${{ env.LIBARCHIVE_VERSION }} libarchive_src

      - name: Build libarchive (static)
        run: |
          cmake -B la_build -S libarchive_src \
            -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=${{ matrix.sdk }} \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_INSTALL_PREFIX=$PWD/la_install \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_TEST=OFF \
            -DENABLE_CPIO=OFF \
            -DENABLE_CAT=OFF \
            -DENABLE_TAR=OFF \
            -DENABLE_UNZIP=OFF \
            -DENABLE_XATTR=OFF \
            -DENABLE_ACL=OFF \
            -DENABLE_BZip2=OFF \
            -DENABLE_LIBXML2=OFF \
            -DENABLE_EXPAT=OFF \
            -DENABLE_LZ4=OFF \
            -DENABLE_LZMA=OFF \
            -DENABLE_ZSTD=OFF \
            -DENABLE_ICONV=OFF \
            -DENABLE_OPENSSL=OFF \
            -DENABLE_NETTLE=OFF \
            -DENABLE_ZLIB=ON \
            -DZLIB_ROOT=$PWD/zlib_install \
            -DCMAKE_PREFIX_PATH=$PWD/zlib_install
          cmake --build la_build --parallel $(sysctl -n hw.ncpu)
          cmake --install la_build

      - name: Prepare artifact
        run: |
          PLATFORM="${{ matrix.platform }}"
          ARCH="${{ matrix.arch }}"
          mkdir -p artifact/ios/$PLATFORM-$ARCH/include
          mkdir -p artifact/ios/$PLATFORM-$ARCH/lib

          cp la_install/include/archive*.h artifact/ios/$PLATFORM-$ARCH/include/
          cp la_install/lib/libarchive*.a artifact/ios/$PLATFORM-$ARCH/lib/

          echo "=== Built files ==="
          find artifact -type f

      - name: Verify artifact
        uses: ./.github/actions/verify-artifact
        with:
          artifact-path: artifact/ios/${{ matrix.platform }}-${{ matrix.arch }}
          platform: ios
          library-name: libarchive
          expect-static-libs: '1'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libarchive-ios-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifact/
          retention-days: 30

  build-ios-xcframework:
    needs: build-ios
    if: contains(github.event.inputs.platforms, 'ios')
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: libarchive-ios-*
          path: downloads/

      - name: Create XCFramework
        run: |
          DEVICE_LIB=$(find downloads -path "*iphoneos*arm64*" -name "libarchive*.a" 2>/dev/null | head -1)
          SIM_ARM64_LIB=$(find downloads -path "*iphonesimulator*arm64*" -name "libarchive*.a" 2>/dev/null | head -1)
          SIM_X86_64_LIB=$(find downloads -path "*iphonesimulator*x86_64*" -name "libarchive*.a" 2>/dev/null | head -1)

          if [ -z "$DEVICE_LIB" ] || [ -z "$SIM_ARM64_LIB" ] || [ -z "$SIM_X86_64_LIB" ]; then
            echo "ERROR: Missing required library files"
            find downloads -type f 2>/dev/null
            exit 1
          fi

          DEVICE_DIR=$(dirname "$(dirname "$DEVICE_LIB")")
          HEADER_DIR="$DEVICE_DIR/include"

          mkdir -p artifact/ios/include
          cp -r "$HEADER_DIR/"* artifact/ios/include/

          mkdir -p sim_fat
          lipo -create "$SIM_ARM64_LIB" "$SIM_X86_64_LIB" -output sim_fat/libarchive.a

          xcodebuild -create-xcframework \
            -library "$DEVICE_LIB" \
            -headers "$HEADER_DIR" \
            -library sim_fat/libarchive.a \
            -headers "$HEADER_DIR" \
            -output artifact/ios/libarchive.xcframework

      - name: Verify artifact
        uses: ./.github/actions/verify-artifact
        with:
          artifact-path: artifact/ios
          platform: ios
          library-name: libarchive
          expect-static-libs: '1'

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: libarchive-ios-xcframework
          path: artifact/
          retention-days: 30

  build-android:
    if: contains(github.event.inputs.platforms, 'android')
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build patchelf xz-utils

      - name: Download zlib-ng source
        run: |
          curl -L -o zlib.tar.gz https://github.com/zlib-ng/zlib-ng/archive/refs/tags/${{ env.ZLIB_VERSION }}.tar.gz
          tar -xzf zlib.tar.gz
          mv zlib-ng-${{ env.ZLIB_VERSION }} zlib_src

      - name: Build zlib-ng (static)
        run: |
          cmake -B zlib_build -S zlib_src \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PWD/zlib_install \
            -DZLIB_COMPAT=ON \
            -DZLIB_ENABLE_TESTS=OFF \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build zlib_build --parallel $(nproc)
          cmake --install zlib_build

      - name: Download libarchive source
        run: |
          curl -L -o libarchive.tar.xz https://github.com/libarchive/libarchive/releases/download/v${{ env.LIBARCHIVE_VERSION }}/libarchive-${{ env.LIBARCHIVE_VERSION }}.tar.xz
          tar -xf libarchive.tar.xz
          mv libarchive-${{ env.LIBARCHIVE_VERSION }} libarchive_src

      - name: Build libarchive (shared)
        run: |
          cmake -B la_build -S libarchive_src \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PWD/la_install \
            -DBUILD_SHARED_LIBS=ON \
            -DENABLE_TEST=OFF \
            -DENABLE_CPIO=OFF \
            -DENABLE_CAT=OFF \
            -DENABLE_TAR=ON \
            -DENABLE_XATTR=OFF \
            -DENABLE_ACL=OFF \
            -DENABLE_BZip2=OFF \
            -DENABLE_LIBXML2=OFF \
            -DENABLE_EXPAT=OFF \
            -DENABLE_LZ4=OFF \
            -DENABLE_LZMA=OFF \
            -DENABLE_ZSTD=OFF \
            -DENABLE_ICONV=OFF \
            -DENABLE_OPENSSL=OFF \
            -DENABLE_NETTLE=OFF \
            -DENABLE_ZLIB=ON \
            -DZLIB_ROOT=$PWD/zlib_install \
            -DCMAKE_PREFIX_PATH=$PWD/zlib_install
          cmake --build la_build --parallel $(nproc)
          cmake --install la_build

      - name: Prepare artifact
        run: |
          ABI="${{ matrix.abi }}"
          mkdir -p artifact/android/$ABI/include
          mkdir -p artifact/android/$ABI/lib

          cp la_install/include/archive*.h artifact/android/$ABI/include/
          cp la_install/lib/*.so artifact/android/$ABI/lib/ 2>/dev/null || true

          echo "=== Built files ==="
          find artifact -type f

      - name: Fix Android RPATH
        uses: ./.github/actions/fix-android-rpath
        with:
          lib-path: artifact/android/${{ matrix.abi }}/lib

      - name: Verify artifact
        uses: ./.github/actions/verify-artifact
        with:
          artifact-path: artifact/android/${{ matrix.abi }}
          platform: android
          library-name: libarchive
          expect-shared-libs: '1'
          expect-static-libs: '0'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libarchive-android-${{ matrix.abi }}
          path: artifact/
          retention-days: 30

  build-linux:
    if: contains(github.event.inputs.platforms, 'linux')
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build xz-utils

      - name: Download zlib-ng source
        run: |
          curl -L -o zlib.tar.gz https://github.com/zlib-ng/zlib-ng/archive/refs/tags/${{ env.ZLIB_VERSION }}.tar.gz
          tar -xzf zlib.tar.gz
          mv zlib-ng-${{ env.ZLIB_VERSION }} zlib_src

      - name: Build zlib-ng (static)
        run: |
          cmake -B zlib_build -S zlib_src \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PWD/zlib_install \
            -DZLIB_COMPAT=ON \
            -DZLIB_ENABLE_TESTS=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build zlib_build --parallel
          cmake --install zlib_build

      - name: Download libarchive source
        run: |
          curl -L -o libarchive.tar.xz https://github.com/libarchive/libarchive/releases/download/v${{ env.LIBARCHIVE_VERSION }}/libarchive-${{ env.LIBARCHIVE_VERSION }}.tar.xz
          tar -xf libarchive.tar.xz
          mv libarchive-${{ env.LIBARCHIVE_VERSION }} libarchive_src

      - name: Build libarchive (shared)
        run: |
          cmake -B la_build -S libarchive_src \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PWD/la_install \
            -DBUILD_SHARED_LIBS=ON \
            -DENABLE_TEST=OFF \
            -DENABLE_CPIO=OFF \
            -DENABLE_CAT=OFF \
            -DENABLE_TAR=ON \
            -DENABLE_XATTR=OFF \
            -DENABLE_ACL=OFF \
            -DENABLE_BZip2=OFF \
            -DENABLE_LIBXML2=OFF \
            -DENABLE_EXPAT=OFF \
            -DENABLE_LZ4=OFF \
            -DENABLE_LZMA=OFF \
            -DENABLE_ZSTD=OFF \
            -DENABLE_ICONV=OFF \
            -DENABLE_OPENSSL=OFF \
            -DENABLE_NETTLE=OFF \
            -DENABLE_ZLIB=ON \
            -DZLIB_ROOT=$PWD/zlib_install \
            -DCMAKE_PREFIX_PATH=$PWD/zlib_install
          cmake --build la_build --parallel
          cmake --install la_build

      - name: Prepare artifact
        run: |
          mkdir -p artifact/linux/x64/include
          mkdir -p artifact/linux/x64/lib

          cp la_install/include/archive*.h artifact/linux/x64/include/
          cp la_install/lib/libarchive.so* artifact/linux/x64/lib/ 2>/dev/null || true

      - name: Verify artifact
        uses: ./.github/actions/verify-artifact
        with:
          artifact-path: artifact/linux/x64
          platform: linux
          library-name: libarchive
          expect-shared-libs: '1'
          expect-static-libs: '0'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libarchive-linux-x64
          path: artifact/
          retention-days: 30

  # ============================================================================
  # Merge All Artifacts
  # ============================================================================
  merge-artifacts:
    needs: [build-windows, build-macos, build-ios-xcframework, build-android, build-linux]
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge all platform artifacts
        uses: ./.github/actions/merge-artifacts
        with:
          library-name: libarchive
          version: ${{ github.event.inputs.libarchive_version }}
          windows-archs: 'x64,x86,arm64'
          macos-platforms: 'intel,arm'
          android-abis: 'arm64-v8a,armeabi-v7a,x86_64,x86'
          has-ios: 'true'
          has-linux: 'true'
